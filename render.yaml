services:
  - type: web
    name: asteria-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    region: ohio
    envVars:
      - key: PORT
        value: 8000
      - key: NASA_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: GOLD_API_KEY
        sync: false
